name: Prebuild Files

on:
  push:
    branches:
      - main
    paths-ignore:
      - "prebuilt-files/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Prepare output directories
        run: |
          rm -rf prebuilt-files/agent prebuilt-files/default
          mkdir -p prebuilt-files/agent prebuilt-files/default

      - name: Build agent-mode outputs
        run: python assemble_instructions.py --mode agent --output-dir prebuilt-files/agent codex copilot

      - name: Build default-mode outputs
        run: python assemble_instructions.py --mode default --output-dir prebuilt-files/default codex copilot

      - name: Write mode picker
        run: |
          cat > prebuilt-files/PICK-ONE.md <<'EOF'
          # Pick One

          This directory contains prebuilt KirOpen outputs for the supported harnesses.

          Choose one mode:

          - `agent/`
            Use this when you want KirOpen to stay mostly opt-in through harness-specific agents, shared skills, prompts, and scoped guidance.
          - `default/`
            Use this when you want KirOpen to also shape the harness's default repository-wide behavior.

          Both folders contain prebuilt outputs for the currently supported harnesses:

          - Codex
          - GitHub Copilot

          Copy the files you want from the chosen mode into the target repository, following the installation guidance in this repo's `README.md`.
          EOF

      - name: Commit updated prebuilt files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prebuilt-files
          git diff --cached --quiet || git commit -m "Update prebuilt files [skip ci]"

      - name: Push changes
        run: git push
